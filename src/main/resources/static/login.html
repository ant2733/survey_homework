<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>线上问卷调研平台 - 登录注册</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.6;
        }

        .circle1 {
            width: 280px;
            height: 280px;
            background: #93c5fd;
            top: -80px;
            left: -60px;
        }

        .circle2 {
            width: 360px;
            height: 360px;
            background: #c4b5fd;
            right: -120px;
            bottom: -100px;
        }

        .container {
            width: 920px;
            height: 560px;
            display: flex;
            border-radius: 28px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 80px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.75);
            z-index: 10;
        }

        .left-panel {
            flex: 1;
            padding: 60px 50px;
            background: linear-gradient(160deg, rgba(37, 99, 235, 0.9), rgba(79, 70, 229, 0.85));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .left-content h1 {
            font-size: 36px;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .left-content p {
            font-size: 15px;
            line-height: 1.8;
            opacity: 0.9;
        }

        .role-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .role-list span {
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
        }

        .right-panel {
            width: 430px;
            padding: 52px 48px;
            background: rgba(255, 255, 255, 0.72);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 36px;
        }

        .tab {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: #f1f5f9;
            color: #64748b;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
        }

        .tab.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
        }

        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            height: 46px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 0 15px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            transition: 0.25s;
        }

        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.25s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.28);
        }

        .message {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="container">

    <div class="left-panel">
        <div class="logo">Survey RBAC</div>

        <div class="left-content">
            <h1>线上问卷调研平台后台管理系统</h1>
            <p>
                支持自定义问卷、问卷分发、答卷统计、图表可视化和付费问卷套餐管理。
                系统通过 RBAC 权限模型实现不同后台角色的精细化权限控制。
            </p>
        </div>

        <div class="role-list">
            <span>平台管理员</span>
            <span>企业运营</span>
            <span>问卷设计师</span>
            <span>数据审核员</span>
            <span>财务</span>
        </div>
    </div>

    <div class="right-panel">

        <div class="tabs">
            <button class="tab active" id="loginTab">登录</button>
            <button class="tab" id="registerTab">注册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <h2 class="form-title">欢迎回来</h2>
            <p class="form-subtitle">请输入账号密码登录后台系统</p>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>

            <button type="submit" class="submit-btn">登录</button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden">
            <h2 class="form-title">创建账号</h2>
            <p class="form-subtitle">注册后可登录后台系统</p>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码">
            </div>

            <button type="submit" class="submit-btn">注册</button>
        </form>

        <div class="message" id="message"></div>

    </div>
</div>

<script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const message = document.getElementById("message");

    loginTab.onclick = function () {
        loginTab.classList.add("active");
        registerTab.classList.remove("active");

        loginForm.classList.remove("hidden");
        registerForm.classList.add("hidden");

        clearMessage();
    };

    registerTab.onclick = function () {
        registerTab.classList.add("active");
        loginTab.classList.remove("active");

        registerForm.classList.remove("hidden");
        loginForm.classList.add("hidden");

        clearMessage();
    };

    // 登录
    loginForm.onsubmit = async function (e) {
        e.preventDefault();

        const userName = document.getElementById("loginUsername").value.trim();
        const passWord = document.getElementById("loginPassword").value.trim();

        if (!userName || !passWord) {
            showMessage("请输入用户名和密码", "error");
            return;
        }

        try {
            const res = await fetch("/api/user/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userName: userName,
                    passWord: passWord
                })
            });

            const result = await res.json();

            if (result.code === 200) {
                showMessage("登录成功，正在跳转...", "success");

                /*
                    这里假设你的后端返回格式是：
                    {
                        "code": 200,
                        "message": "success",
                        "data": {
                            "token": "xxx"
                        }
                    }
                */
                if (result.data && result.data.token) {
                    localStorage.setItem("token", result.data.token);
                }

                setTimeout(function () {
                    window.location.href = "/index.html";
                }, 800);

            } else {
                showMessage(result.message || "登录失败", "error");
            }

        } catch (err) {
            console.log(err);
            showMessage("服务器连接失败，请检查后端登录接口", "error");
        }
    };

    // 注册
    registerForm.onsubmit = async function (e) {
        e.preventDefault();

        const userName = document.getElementById("registerUsername").value.trim();
        const passWord = document.getElementById("registerPassword").value.trim();

        if (!userName || !passWord) {
            showMessage("请输入用户名和密码", "error");
            return;
        }

        try {
            const res = await fetch("/api/user/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userName: userName,
                    passWord: passWord
                })
            });

            const result = await res.json();

            if (result.code === 200) {
                showMessage("注册成功，请登录", "success");

                document.getElementById("registerUsername").value = "";
                document.getElementById("registerPassword").value = "";

                registerTab.classList.remove("active");
                loginTab.classList.add("active");

                registerForm.classList.add("hidden");
                loginForm.classList.remove("hidden");

            } else {
                showMessage(result.message || "注册失败", "error");
            }

        } catch (err) {
            console.log(err);
            showMessage("服务器连接失败，请检查后端注册接口", "error");
        }
    };

    function showMessage(text, type) {
        message.textContent = text;
        message.className = "message " + type;
    }

    function clearMessage() {
        message.textContent = "";
        message.className = "message";
    }
</script>

</body>
</html>
